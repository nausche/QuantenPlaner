<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Quantum-Planer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
        <div class="header-top">
          <h1>QUANTUM-PLANER</h1>
          <button id="sync-btn" title="Mobil-Synchronisierung">📱</button>
        </div>
        <select id="step-select"></select> </header>

    <div id="step-content"></div>



  </div>
  <div id="image-modal" class="modal hidden">
    <span class="modal-close">&times;</span>
    <img class="modal-content" id="full-image">
  </div>

  <div id="sync-modal" class="modal hidden">
    <div class="modal-content sync-content">
      <span class="modal-close" id="sync-close">&times;</span>
      <h3>Mobil-Synchronisierung</h3>
      
      <div class="sync-section">
        <p>Scanne diesen Code mit deinem Handy, um deine aktuelle Stadtplanung unterwegs zu sehen:</p>
        <div id="qrcode-container">
          <img id="qrcode-img" src="" alt="QR Code">
        </div>
      </div>

      <div class="sync-divider"><span>ODER</span></div>

      <div class="sync-section">
        <p>Manueller Export/Import Code:</p>
        <textarea id="sync-data-box" readonly></textarea>
        <div class="sync-btns">
          <button id="copy-sync-btn">📋 Code kopieren</button>
          <button id="import-sync-btn">📥 Code importieren</button>
        </div>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
  <div id="back-to-top" class="hidden">▲</div>
  <style>
  #app {
    padding-bottom: 80px; /* Erhöht, damit der letzte Content-Block frei liegt */
  }
</style>
</body>
</html>
